<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafana Canvas 预览工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1e1e1e;
            color: #fff;
            overflow: hidden;
        }
        
        .toolbar {
            background: #2d2d2d;
            padding: 10px 20px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-bottom: 1px solid #444;
        }
        
        .toolbar button {
            background: #4a4a4a;
            color: white;
            border: 1px solid #666;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .toolbar button:hover {
            background: #5a5a5a;
        }
        
        .toolbar input[type="file"] {
            display: none;
        }
        
        .toolbar label {
            background: #4a4a4a;
            color: white;
            border: 1px solid #666;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            display: inline-block;
        }
        
        .toolbar label:hover {
            background: #5a5a5a;
        }
        
        .info {
            color: #aaa;
            font-size: 14px;
        }
        
        #canvas-container {
            width: 100%;
            height: calc(100vh - 50px);
            overflow: auto;
            background: #1e1e1e;
            position: relative;
        }
        
        #canvas {
            position: relative;
            width: 3000px;
            height: 2000px;
            background: 
                linear-gradient(90deg, #2a2a2a 1px, transparent 1px),
                linear-gradient(0deg, #2a2a2a 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .element {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            word-wrap: break-word;
            overflow: hidden;
            cursor: move;
            transition: box-shadow 0.2s;
        }
        
        .element:hover {
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            z-index: 1000;
        }
        
        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .link-line {
            stroke-width: 2;
            fill: none;
        }
        
        .link-arrow {
            fill: none;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <label for="file-input">📁 选择 .canvas 文件</label>
        <input type="file" id="file-input" accept=".canvas,.json">
        <button onclick="resetZoom()">🔍 重置缩放</button>
        <button onclick="exportImage()">📷 导出图片</button>
        <span class="info" id="file-info">请选择一个 Grafana Canvas 文件</span>
    </div>
    
    <div id="canvas-container">
        <div id="canvas">
            <svg id="links-layer"></svg>
        </div>
    </div>
    
    <script>
        let currentScale = 1;
        let elements = [];
        let links = [];
        
        // 文件选择处理
        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const data = JSON.parse(event.target.result);
                    renderCanvas(data);
                    document.getElementById('file-info').textContent = `已加载: ${file.name} (${elements.length} 个元素, ${links.length} 个连接)`;
                } catch (error) {
                    alert('文件格式错误: ' + error.message);
                }
            };
            reader.readAsText(file);
        });
        
        // 渲染画布
        function renderCanvas(data) {
            const canvas = document.getElementById('canvas');
            const linksLayer = document.getElementById('links-layer');
            
            // 清空现有内容
            canvas.querySelectorAll('.element').forEach(el => el.remove());
            linksLayer.innerHTML = '';
            
            elements = data.elements || [];
            links = data.links || [];
            
            // 渲染元素
            elements.forEach((elem, index) => {
                const el = document.createElement('div');
                el.className = 'element';
                el.style.left = elem.x + 'px';
                el.style.top = elem.y + 'px';
                el.style.width = elem.width + 'px';
                el.style.height = elem.height + 'px';
                
                const opts = elem.options || {};
                
                // 背景色
                if (opts.backgroundColor) {
                    el.style.backgroundColor = opts.backgroundColor;
                    if (opts.backgroundOpacity) {
                        el.style.opacity = opts.backgroundOpacity;
                    }
                }
                
                // 边框
                if (opts.borderColor) {
                    el.style.border = `${opts.borderWidth || 1}px solid ${opts.borderColor}`;
                }
                
                // 圆角
                if (opts.borderRadius) {
                    el.style.borderRadius = opts.borderRadius + 'px';
                }
                
                // 文字
                if (opts.text) {
                    el.textContent = opts.text;
                }
                
                // 文字样式
                if (opts.textAlign) {
                    el.style.textAlign = opts.textAlign;
                }
                if (opts.verticalAlign) {
                    el.style.alignItems = opts.verticalAlign === 'middle' ? 'center' : 
                                         opts.verticalAlign === 'top' ? 'flex-start' : 'flex-end';
                }
                if (opts.fontSize) {
                    el.style.fontSize = opts.fontSize + 'px';
                }
                if (opts.fontWeight) {
                    el.style.fontWeight = opts.fontWeight;
                }
                if (opts.color) {
                    el.style.color = opts.color;
                }
                
                el.title = opts.text || `元素 ${index + 1}`;
                canvas.appendChild(el);
            });
            
            // 渲染连接线
            renderLinks();
        }
        
        // 渲染连接线
        function renderLinks() {
            const linksLayer = document.getElementById('links-layer');
            const svgNS = "http://www.w3.org/2000/svg";
            
            links.forEach(link => {
                const sourceElem = elements.find(e => e.name === link.source);
                const targetElem = elements.find(e => e.name === link.target);
                
                if (!sourceElem || !targetElem) return;
                
                const opts = link.options || {};
                
                // 计算连接点
                const x1 = sourceElem.x + sourceElem.width / 2;
                const y1 = sourceElem.y + sourceElem.height;
                const x2 = targetElem.x + targetElem.width / 2;
                const y2 = targetElem.y;
                
                // 创建路径
                const path = document.createElementNS(svgNS, 'path');
                const midY = (y1 + y2) / 2;
                path.setAttribute('d', `M ${x1} ${y1} C ${x1} ${midY}, ${x2} ${midY}, ${x2} ${y2}`);
                path.setAttribute('stroke', opts.color || '#82b366');
                path.setAttribute('stroke-width', opts.width || 2);
                path.setAttribute('fill', 'none');
                
                if (opts.dash) {
                    path.setAttribute('stroke-dasharray', opts.dash);
                }
                
                linksLayer.appendChild(path);
            });
        }
        
        // 缩放功能
        document.getElementById('canvas-container').addEventListener('wheel', function(e) {
            e.preventDefault();
            
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            currentScale *= delta;
            currentScale = Math.max(0.1, Math.min(5, currentScale));
            
            document.getElementById('canvas').style.transform = `scale(${currentScale})`;
            document.getElementById('canvas').style.transformOrigin = '0 0';
        });
        
        function resetZoom() {
            currentScale = 1;
            document.getElementById('canvas').style.transform = 'scale(1)';
            document.getElementById('canvas-container').scrollTo(0, 0);
        }
        
        // 导出图片
        function exportImage() {
            alert('导出功能开发中...');
        }
        
        // 拖拽功能
        let isDragging = false;
        let startX, startY, scrollLeft, scrollTop;
        const container = document.getElementById('canvas-container');
        
        container.addEventListener('mousedown', (e) => {
            if (e.target === container || e.target === document.getElementById('canvas')) {
                isDragging = true;
                startX = e.pageX - container.offsetLeft;
                startY = e.pageY - container.offsetTop;
                scrollLeft = container.scrollLeft;
                scrollTop = container.scrollTop;
                container.style.cursor = 'grabbing';
            }
        });
        
        container.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const x = e.pageX - container.offsetLeft;
            const y = e.pageY - container.offsetTop;
            container.scrollLeft = scrollLeft - (x - startX);
            container.scrollTop = scrollTop - (y - startY);
        });
        
        container.addEventListener('mouseup', () => {
            isDragging = false;
            container.style.cursor = 'default';
        });
        
        container.addEventListener('mouseleave', () => {
            isDragging = false;
            container.style.cursor = 'default';
        });
        
        // 页面加载时自动加载示例文件
        window.addEventListener('load', () => {
            // 尝试加载同目录下的 .canvas 文件
            const fileInput = document.getElementById('file-input');
            // 可以在这里添加自动加载逻辑
        });
    </script>
</body>
</html>
